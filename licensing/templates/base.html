<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MilhasUP — Painel Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* ── Variáveis Bootstrap override (dark mode) ── */
    :root {
      --bs-body-color: #e6edf3;
      --bs-body-bg: #0d1117;
      --bs-secondary-color: #8b949e;
      --bs-secondary-bg: #161b22;
      --bs-emphasis-color: #f0f6fc;
      --bs-border-color: #30363d;
      --bs-link-color: #58a6ff;
      --bs-link-hover-color: #79c0ff;
      --bs-code-color: #79c0ff;
    }
    body { background: #0d1117; color: #e6edf3; }

    /* Navbar */
    .navbar { background: #161b22 !important; border-bottom: 1px solid #30363d; }

    /* Cards */
    .card { background: #161b22; border: 1px solid #30363d; color: #e6edf3; }
    .card-footer { background: #1c2128 !important; border-color: #30363d !important; color: #8b949e; }
    h5, .h5, .card-title { color: #e6edf3; }

    /* Formulários */
    label, .form-label { color: #e6edf3 !important; }
    .form-control, .form-select, .form-control::placeholder {
      background: #0d1117; color: #e6edf3; border-color: #30363d;
    }
    .form-control::placeholder { color: #484f58; }
    .form-control:focus, .form-select:focus {
      background: #0d1117; color: #e6edf3; border-color: #58a6ff;
      box-shadow: 0 0 0 0.2rem rgba(88,166,255,.25);
    }
    .form-select option { background: #161b22; color: #e6edf3; }

    /* Tabelas */
    .table {
      --bs-table-bg: #161b22; --bs-table-color: #e6edf3;
      --bs-table-hover-bg: #1c2128; --bs-table-border-color: #30363d;
      border-color: #30363d;
    }
    .table thead th { color: #8b949e; border-color: #30363d !important; font-weight: 600; }
    .table tbody tr { border-color: #30363d; }

    /* Badges */
    .badge.bg-success  { background: #238636 !important; }
    .badge.bg-warning  { background: #9e6a03 !important; color: #e6edf3 !important; }
    .badge.bg-secondary{ background: #484f58 !important; }
    .badge.bg-danger   { background: #da3633 !important; }

    /* Links */
    a { color: #58a6ff; } a:hover { color: #79c0ff; }
    code { color: #79c0ff; background: rgba(110,118,129,.1); padding: .1em .3em; border-radius: 4px; }

    /* Botões */
    .btn-primary   { background: #238636; border-color: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; border-color: #2ea043; color: #fff; }
    .btn-outline-secondary { color: #8b949e; border-color: #30363d; }
    .btn-outline-secondary:hover { background: #21262d; color: #e6edf3; border-color: #8b949e; }
    .btn-outline-danger { color: #f85149; border-color: #f85149; }
    .btn-outline-danger:hover { background: rgba(248,81,73,.1); color: #f85149; }
    .btn-outline-light { color: #e6edf3; border-color: #484f58; }
    .btn-outline-light:hover { background: #21262d; color: #e6edf3; }

    /* Input group */
    .input-group .btn-outline-secondary { color: #8b949e; border-color: #30363d; }
    .input-group .btn-outline-secondary:hover { background: #21262d; color: #e6edf3; }
    .input-group-text { background: #161b22; border-color: #30363d; color: #8b949e; }

    /* Alertas */
    .alert-danger {
      background: rgba(218,54,51,.12); border-color: #da3633; color: #ff7b72;
    }

    /* Textos auxiliares */
    .text-muted { color: #8b949e !important; }
    small, .small { color: #8b949e; }

    /* Stats cards */
    .stat-card { text-align: center; padding: 1rem; }
    .stat-card .number { font-size: 2rem; font-weight: 700; }

    /* Paginação */
    .btn-outline-secondary.btn-sm { padding: .2rem .55rem; font-size: .8rem; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark mb-4">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">✈ MilhasUP · Licenças</span>
    <div>
      <a href="/admin/" class="btn btn-sm btn-outline-light me-2">Início</a>
      <a href="/admin/new" class="btn btn-sm btn-success me-2">+ Nova</a>
      <a href="/admin/logout" class="btn btn-sm btn-outline-danger">Sair</a>
    </div>
  </div>
</nav>
<div class="container-fluid">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
