{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-6">
<div class="card p-4">
  <h5 class="mb-4">Nova Licença</h5>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Nome do cliente *</label>
      <input type="text" name="customer_name" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email *</label>
      <input type="email" name="customer_email" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Plano</label>
      <select name="plan" class="form-select">
        <option value="monthly">Mensal</option>
        <option value="annual">Anual</option>
        <option value="lifetime">Vitalício</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Expira em *</label>
      <div class="input-group">
        <input type="date" name="expires_at" id="expires_at" class="form-control"
               value="{{ default_expires }}" required>
        <button type="button" class="btn btn-outline-secondary" onclick="addDays(30)">+30d</button>
        <button type="button" class="btn btn-outline-secondary" onclick="addDays(90)">+90d</button>
        <button type="button" class="btn btn-outline-secondary" onclick="addDays(365)">+1a</button>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">Observações</label>
      <textarea name="notes" class="form-control" rows="2"></textarea>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary flex-grow-1">Criar Licença</button>
      <a href="/admin/" class="btn btn-outline-secondary">Cancelar</a>
    </div>
  </form>
</div>
</div>
</div>
<script>
function addDays(n) {
  const d = new Date(); d.setDate(d.getDate() + n);
  document.getElementById('expires_at').value = d.toISOString().slice(0,10);
}
</script>
{% endblock %}
