<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>MilhasUP Admin — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0d1117; color: #e6edf3; display: flex;
           align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #161b22; border: 1px solid #30363d; width: 360px; }
    .form-control { background: #0d1117; color: #e6edf3; border-color: #30363d; }
    .form-control:focus { background: #0d1117; color: #e6edf3; border-color: #58a6ff; }
  </style>
</head>
<body>
<div class="card p-4">
  <h4 class="text-center mb-4">✈ MilhasUP Admin</h4>
  {% if error %}<div class="alert alert-danger py-2">{{ error }}</div>{% endif %}
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Senha</label>
      <input type="password" name="password" class="form-control" autofocus required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Entrar</button>
  </form>
</div>
</body>
</html>
